name: Auto Release

on:
  push:
    tags:
      - v* # 匹配类似 v1.0 
      - v*.*.* # 明确匹配类似 v0.1.1 的语义化版本号
  workflow_dispatch: # 【新增】允许你在 Actions 网页端手动点击运行

jobs:
  build:
    name: Build Project
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1

      - name: Cache xmake dependencies
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/.xmake
          key: xmake-${{ hashFiles('xmake.lua') }}
          restore-keys: xmake-

      - name: Update xmake repository
        run: xmake repo -u

      - name: Configure xmake (Client Only)
        run: xmake f -a x64 -m release -p windows -y

      - name: Build
        run: xmake

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: bin/

  release:
    name: Create Release
    needs: build
    permissions:
      contents: write # 授予自动创建 Release 的写权限
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: artifact

      - name: Package Release Archive
        run: |
          cp CHANGELOG.md LICENSE README.md artifact/ 2>/dev/null || true
          cd artifact
          zip -r ../${{ github.event.repository.name }}-client-windows-x64.zip *

      - name: Extract Release Notes
        id: extract-release-notes
        uses: ffurrer2/extract-release-notes@v2
        continue-on-error: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }} 
          name: Release ${{ github.ref_name }}
          body: ${{ steps.extract-release-notes.outputs.release_notes || '系统自动发布的客户端版本。' }}
          files: ${{ github.event.repository.name }}-client-windows-x64.zip
          draft: false
          prerelease: false
