name: Auto Release

on:
  push:
    # 监听以 'v' 开头的 tag 推送，例如 v1.0.0
    tags:
      - 'v*'

jobs:
  build:
    name: Build Project
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1

      - name: Cache xmake dependencies
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/.xmake
          key: xmake-${{ hashFiles('xmake.lua') }}
          restore-keys: xmake-

      - name: Update xmake repository
        run: xmake repo -u

      - name: Configure xmake (Client Only)
        run: xmake f -a x64 -m release -p windows -y

      - name: Build
        run: xmake

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: bin/

  release:
    name: Create Release
    needs: build
    permissions:
      contents: write # 授予自动创建 Release 的写权限
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: artifact

      - name: Package Release Archive
        run: |
          # 复制重要文件到产物目录中
          cp CHANGELOG.md LICENSE README.md artifact/ 2>/dev/null || true
          cd artifact
          # 打包为 ZIP 压缩包
          zip -r ../${{ github.event.repository.name }}-client-windows-x64.zip *

      - name: Extract Release Notes
        id: extract-release-notes
        uses: ffurrer2/extract-release-notes@v2
        continue-on-error: true # 容错，防止没有CHANGELOG导致流程中断

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }} # 使用触发工作流的 Tag 作为版本号
          name: Release ${{ github.ref_name }}
          # 如果提取 CHANGELOG 失败，则提供默认描述
          body: ${{ steps.extract-release-notes.outputs.release_notes || '系统自动发布的客户端版本。' }}
          files: ${{ github.event.repository.name }}-client-windows-x64.zip
          draft: false      # 直接发布而非保存为草稿
          prerelease: false
